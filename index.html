<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H & G Capital - Dashboard MT5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e1a; color: #e2e8f0; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .pnl-positive { color: #22c55e; }
        .pnl-negative { color: #ef4444; }
        .drawdown-safe { color: #22c55e; }
        .drawdown-warning { color: #f59e0b; }
        .drawdown-danger { color: #ef4444; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .live-dot { animation: pulse 2s infinite; }
    </style>
</head>
<body class="min-h-screen">
    
    <!-- Background -->
    <div class="fixed inset-0 bg-gradient-to-br from-slate-900 via-slate-900 to-slate-800 -z-10"></div>
    
    <!-- Header -->
    <header class="glass-card sticky top-0 border-b border-white/10">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center font-bold text-lg font-display">
                        H&G
                    </div>
                    <div>
                        <h1 class="text-xl font-bold font-display text-white">H & G Capital</h1>
                        <div class="flex items-center gap-2 text-xs text-slate-400">
                            <span class="w-2 h-2 bg-green-500 rounded-full live-dot"></span>
                            <span id="lastUpdate">Aguardando dados...</span>
                        </div>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-xs text-slate-500">Dados em tempo real</p>
                    <p class="text-xs text-slate-600">JSONBin.io</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-6xl mx-auto px-6 py-8">
        
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-card rounded-2xl p-5">
                <p class="text-xs text-slate-400 uppercase mb-1">Banca Total</p>
                <h2 class="text-2xl font-bold font-display text-white" id="totalBalance">U$ 0,00</h2>
            </div>
            <div class="glass-card rounded-2xl p-5">
                <p class="text-xs text-slate-400 uppercase mb-1">Resultado Hoje</p>
                <h2 class="text-2xl font-bold font-display" id="totalDaily">U$ 0,00</h2>
            </div>
            <div class="glass-card rounded-2xl p-5">
                <p class="text-xs text-slate-400 uppercase mb-1">Lucro Total</p>
                <h2 class="text-2xl font-bold font-display pnl-positive" id="totalProfit">U$ 0,00</h2>
            </div>
            <div class="glass-card rounded-2xl p-5 border-l-2 border-yellow-500/50">
                <p class="text-xs text-slate-400 uppercase mb-1">Drawdown Máx</p>
                <h2 class="text-2xl font-bold font-display drawdown-safe" id="maxDrawdown">0,00%</h2>
            </div>
        </div>

        <!-- Accounts -->
        <div id="accountsList" class="space-y-4">
            <!-- Accounts loaded here -->
        </div>

        <!-- Loading State -->
        <div id="loading" class="text-center py-16">
            <div class="w-12 h-12 mx-auto mb-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-slate-400">Carregando dados do MT5...</p>
        </div>
    </main>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // CONFIGURAÇÕES JSONBIN
        // ═══════════════════════════════════════════════════════════════
        const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/69c560adaa77b81da9219078/latest';
        const JSONBIN_KEY = '$2a$10$7Eq25kZBJrrStjIitBZvjeOMWDZQZ/LEYSQERycefja5cb00698X.';
        
        // ═══════════════════════════════════════════════════════════════
        // FUNÇÕES UTILITÁRIAS
        // ═══════════════════════════════════════════════════════════════
        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(value || 0);
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return '--:--';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        
        // ═══════════════════════════════════════════════════════════════
        // FETCH DATA FROM JSONBIN
        // ═══════════════════════════════════════════════════════════════
        async function fetchData() {
            try {
                const response = await fetch(JSONBIN_URL, {
                    headers: { 'X-Master-Key': JSONBIN_KEY }
                });
                
                if (!response.ok) throw new Error('HTTP ' + response.status);
                
                const result = await response.json();
                const data = result.record;
                
                updateDashboard(data);
                
            } catch (error) {
                console.error('Erro ao buscar dados:', error);
                document.getElementById('lastUpdate').textContent = 'Erro de conexão';
            }
        }
        
        // ═══════════════════════════════════════════════════════════════
        // UPDATE DASHBOARD
        // ═══════════════════════════════════════════════════════════════
        function updateDashboard(data) {
            const accounts = data.accounts || [];
            
            // Hide loading
            document.getElementById('loading').classList.add('hidden');
            
            // Calculate totals
            let totalBalance = 0;
            let totalDaily = 0;
            let totalProfit = 0;
            let maxDrawdown = 0;
            
            accounts.forEach(acc => {
                totalBalance += acc.equity || acc.balance || 0;
                totalDaily += acc.dailyProfit || 0;
                totalProfit += acc.profit || 0;
                if (acc.drawdown > maxDrawdown) maxDrawdown = acc.drawdown;
            });
            
            // Update summary cards
            document.getElementById('totalBalance').textContent = formatCurrency(totalBalance);
            
            const dailyEl = document.getElementById('totalDaily');
            dailyEl.textContent = (totalDaily >= 0 ? '+' : '') + formatCurrency(totalDaily);
            dailyEl.className = 'text-2xl font-bold font-display ' + (totalDaily >= 0 ? 'pnl-positive' : 'pnl-negative');
            
            document.getElementById('totalProfit').textContent = (totalProfit >= 0 ? '+' : '') + formatCurrency(totalProfit);
            
            const ddEl = document.getElementById('maxDrawdown');
            ddEl.textContent = maxDrawdown.toFixed(2) + '%';
            ddEl.className = 'text-2xl font-bold font-display ' + 
                (maxDrawdown > 4 ? 'drawdown-danger' : maxDrawdown > 2 ? 'drawdown-warning' : 'drawdown-safe');
            
            // Update accounts list
            const container = document.getElementById('accountsList');
            
            if (accounts.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-slate-500">Nenhuma conta conectada</p>
                        <p class="text-sm text-slate-600 mt-1">Verifique se o EA está rodando no MT5</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = accounts.map(acc => {
                const dailyClass = acc.dailyProfit >= 0 ? 'pnl-positive' : 'pnl-negative';
                const ddClass = acc.drawdown > 4 ? 'drawdown-danger' : acc.drawdown > 2 ? 'drawdown-warning' : 'drawdown-safe';
                
                return `
                    <div class="glass-card rounded-2xl p-5">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center">
                                    <span class="font-bold text-blue-400">${acc.name?.charAt(0) || 'A'}</span>
                                </div>
                                <div>
                                    <h3 class="font-semibold text-white">${acc.name || 'Conta'}</h3>
                                    <p class="text-xs text-slate-400">ID: ${acc.accountId}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-xs text-slate-500">Atualizado</p>
                                <p class="text-xs text-slate-400">${formatTime(acc.timestamp)}</p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-4 gap-4">
                            <div>
                                <p class="text-xs text-slate-500 mb-1">Banca</p>
                                <p class="text-lg font-semibold text-white">${formatCurrency(acc.equity || acc.balance)}</p>
                            </div>
                            <div>
                                <p class="text-xs text-slate-500 mb-1">Hoje</p>
                                <p class="text-lg font-semibold ${dailyClass}">
                                    ${acc.dailyProfit >= 0 ? '+' : ''}${formatCurrency(acc.dailyProfit)}
                                </p>
                            </div>
                            <div>
                                <p class="text-xs text-slate-500 mb-1">Lucro</p>
                                <p class="text-lg font-semibold ${acc.profit >= 0 ? 'pnl-positive' : 'pnl-negative'}">
                                    ${acc.profit >= 0 ? '+' : ''}${formatCurrency(acc.profit)}
                                </p>
                            </div>
                            <div>
                                <p class="text-xs text-slate-500 mb-1">Drawdown</p>
                                <p class="text-lg font-semibold ${ddClass}">${acc.drawdown?.toFixed(2) || '0.00'}%</p>
                            </div>
                        </div>
                        
                        ${acc.positions > 0 ? `
                            <div class="mt-3 pt-3 border-t border-white/5">
                                <p class="text-xs text-slate-400">
                                    📊 ${acc.positions} posição(ões) aberta(s) | 
                                    Margem: ${formatCurrency(acc.margin)} | 
                                    Livre: ${formatCurrency(acc.marginFree)}
                                </p>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            // Update last update time
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                'Atualizado: ' + now.toLocaleTimeString('pt-BR');
        }
        
        // ═══════════════════════════════════════════════════════════════
        // INICIALIZAR
        // ═══════════════════════════════════════════════════════════════
        fetchData(); // Primeira carga
        setInterval(fetchData, 30000); // Atualizar a cada 30 segundos
    </script>
</body>
</html>
